<!DOCTYPE html>
<html>

<head>
    <title>rock paper scissor</title>
</head>

<body>
    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissor')">Scissor</button>

    <p class="js-score"></p>
    <p class="js-result"></p>
    <p class="js-move"></p>
    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        document.querySelector('.js-result').innerHTML = '';
        document.querySelector('.js-move').innerHTML = '';
        localStorage.removeItem('score');
        updateScoreResult();
    ">Reset Button</button>

    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };

        updateScoreResult();

        function pickBotMove() {
            const randomNumber = Math.random();

            let botMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                botMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                botMove = 'Paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                botMove = 'Scissor';
            }

            return botMove;
        }

        function playGame(buttonMove) {
            const botMove = pickBotMove();

            let result = '';

            if (buttonMove === 'Rock') {
                if (botMove === 'Rock') {
                    result = 'Tie';
                } else if (botMove === 'Paper') {
                    result = 'You lose';
                } else if (botMove === 'Scissor') {
                    result = 'You win';
                }
            } else if (buttonMove === 'Paper') {
                if (botMove === 'Rock') {
                    result = 'You win';
                } else if (botMove === 'Paper') {
                    result = 'Tie';
                } else if (botMove === 'Scissor') {
                    result = 'You lose';
                }
            } else if (buttonMove === 'Scissor') {
                if (botMove === 'Rock') {
                    result = 'You lose';
                } else if (botMove === 'Paper') {
                    result = 'You win';
                } else if (botMove === 'Scissor') {
                    result = 'Tie';
                }
            }

            if (result === 'You win') {
                score.wins += 1;
            } else if (result === 'You lose') {
                score.losses += 1;
            } else if (result === 'Tie') {
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));

            document.querySelector('.js-result').innerHTML = result;
            document.querySelector('.js-move').innerHTML =
                `You ${buttonMove} - bot ${botMove}`
                ;
            updateScoreResult();

            return result;
        }

        function updateScoreResult() {
            document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }
    </script>
</body>

</html>
