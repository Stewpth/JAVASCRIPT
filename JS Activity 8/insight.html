<body>
    <button onclick="updateCartQuantity(10)">+10</button>
    <script>
        /*

        */

        let cartQuantity = JSON.parse(localStorage.getItem('cartQuantity'));

        function updateCartQuantity(buttonValue) {
            cartQuantity += buttonValue;
            console.log(cartQuantity);
            // because of JSON.stringify. 'cartQuantity' converts into string.
            localStorage.setItem('cartQuantity', JSON.stringify(cartQuantity));
        }
    </script>
