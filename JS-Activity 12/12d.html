<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12d Activity</title>
</head>

<body>
    <button class="changing-btn" onclick="changeButton()">Start</button>
    <script>
        function changeButton() {
            const changingButton = document.querySelector('.changing-btn');
            changingButton.innerHTML = 'Loading...';
            setTimeout(function () {
                changingButton.innerHTML = 'Finished!';
            }, 1000);
        }
    </script>
</body>

</html>
