<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Styles for the headers -->
    <link rel="stylesheet" href="styles/headers.css">
    <!-- Styles for the products -->
    <link rel="stylesheet" href="styles/products.css">
    <link rel="stylesheet" href="styles/general.css">
</head>

<body>
    <!-- HEADERS AMAZON -->
    <header class="amazon-header">
        <section class="left-section">
            <button class="home-btn">
                <img class="amazon-logo" src="images/header-image/amazon-logo-white.png" alt="amazon-logo">
            </button>
        </section>
        <section class="middle-section">
            <input type="search" class="search-bar" placeholder="Search">
            <button class="search-btn">
                <img src="images/header-image/search-icon.png" alt="amazon-search-icon" class="search-icon">
            </button>
        </section>
        <section class="right-section">
            <a class="order-link">
                <p class="return-text">Returns</p>
                <p class="order-text">& Orders</p>
            </a>
            <a class="cart-btn header-link">
                <img class="cart-icon" src="images/header-image/cart-icon.png" alt="cart-icon">
                <div class="cart-quantity">2</div>
                <div class="cart-name">Cart</div>
            </a>
        </section>
    </header>

    <main>
        <div class="products-grid js-products-grid">
            <div class="product-box">
                <div class="product-img-box">
                    <img class="product-img" src="images/products/adults-plain-cotton-tshirt-2-pack-teal.jpg"
                        alt="product-image">
                </div>
                <div class="product-name">
                    Black and Gray Athletic Cotton Socks - 6 Pairs
                </div>
                <div class="product-ratings">
                    <img src="images/ratings/rating-45.png" class="product-rating-star">
                    <p class="product-rating-count">87</p>
                </div>
                <div class="product-price">$10.90</div>
                <div class="product-quantity-container">
                    <select class="quanity-selector">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <div class="added-to-cart-msg">
                    <img src="images/Function-img/checkmark.png" class="added-icon">
                    Added
                </div>
                <div class="add-to-cart-box">
                    <button class="add-cart-btn">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <script src="database/products.js"></script>
        <script src="scripts/amazon.js"></script>
    </main>
</body>

</html>
