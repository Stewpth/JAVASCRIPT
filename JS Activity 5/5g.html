<!DOCTYPE html>
<html>

<head>
    <title>5g Activity</title>
</head>

<body>
    <script>
        let cost = 0;
        cost = 5 + 3 * 2 + 9;

        const tax = cost * 0.1;
        const totalCost = cost + tax;

        console.log(`Cost of food: $${cost}`);
        console.log(`Tax(10%): $${tax}`);
        console.log(`Total cost: $${totalCost}`);
    </script>
</body>

</html>
