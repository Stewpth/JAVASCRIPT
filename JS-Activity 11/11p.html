<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11p Activity</title>
</head>

<body>
    <script>
        function traceWord(words) {
            let wordIndex = '-1';

            for (let i = 0; i < words.length; i++) {
                if (words[i] === 'search') {
                    wordIndex = i;
                    break;
                }
            }

            return wordIndex;
        }

        console.log(traceWord(['hello', 'world', 'search', 'good']));
        console.log(traceWord(['not', 'found']));
        console.log(traceWord(['hello', 'world', 'search', 'good', 'search']));
    </script>
</body>
