<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Amazon</title>

    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Icons from Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Styles for the headers -->
    <link rel="stylesheet" href="styles/style-amazon/amazon-headers.css">
    <!-- Styles for the products -->
    <link rel="stylesheet" href="styles/style-amazon/products.css">
    <link rel="stylesheet" href="styles/general.css">

</head>

<body>

    <!-- HEADERS AMAZON-->
    <header class="amazon-header">
        <section class="left-section">
            <a href="amazon.html" class="home-btn">
                <img class="amazon-logo" src="images/header-image/amazon-logo-white.png" alt="amazon-logo">
                <img class="amazon-logo-mobile" src="images/header-image/amazon-mobile-logo-white.png"
                    alt="amazon-logo-mobile">
            </a>
        </section>
        <section class="middle-section">
            <div class="short-option-container">
                <button class="short-btn button-style js-short-btn">
                    <i class="fa-solid fa-filter short-icon"></i>
                </button>
                <div class="short-menu-dropdown js-short-menu-dropdown">
                    <span class="option-title">Short by:</span>
                    <span class="option-style short-by-alphabet">Alphabet</span>
                    <span class="option-style short-by-rate">Rate</span>
                    <span class="option-style short-by-price">Price</span>
                </div>
            </div>
            <input type="search" class="search-bar js-search-bar" placeholder="Search">
            <button class="search-btn button-style js-search-btn">
                <img src="images/header-image/search-icon.png" alt="amazon-search-icon" class="search-icon">
            </button>
        </section>
        <section class="right-section">
            <a href="orders.html" class="order-link">
                <p class="return-text">Returns</p>
                <p class="order-text">& Orders</p>
            </a>
            <a class="cart-btn header-link" href="checkout.html">
                <img class="cart-icon" src="images/header-image/cart-icon.png" alt="cart-icon">
                <div class="cart-quantity js-cart-quantity">2</div>
                <div class="cart-name">Cart</div>
            </a>
        </section>

        <section class="right-section-mobile">
            <img class="hamburger-menu-toggle js-hamburger-menu-toggle" src="images/header-image/hamburger-menu.png"
                alt="hamburger-menu">
        </section>
        <div class="hamburger-menu-dropdown js-hamburger-menu-dropdown">
            <a href="orders.html" class="hamburger-menu-link js-orders-btn">Returns & Orders</a>
            <a href="checkout.html" class="hamburger-menu-link js-cart-btn">Cart (<p
                    class="cart-quantity-mobile js-cart-quantity-mobile">3
                </p>) </a>
        </div>
    </header>

    <main>
        <div class="products-grid js-products-grid"></div>
    </main>

    <script src="scripts/headers.js"></script>
    <script type="module" src="scripts/amazon.js"></script>
</body>

</html>
