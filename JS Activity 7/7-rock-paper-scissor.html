<!DOCTYPE html>
<html>

<head>
    <title>rock paper scissor</title>
</head>

<body>
    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissor')">Scissor</button>

    <script>
        function pickBotMove() {
            const randomNumber = Math.random();

            let botMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                botMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                botMove = 'Paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                botMove = 'Scissor';
            }

            return botMove;
        }

        function playGame(buttonMove) {
            const botMove = pickBotMove();

            let result = '';

            if (buttonMove === 'Rock') {
                if (botMove === 'Rock') {
                    result = 'Tie';
                } else if (botMove === 'Paper') {
                    result = 'You lose';
                } else if (botMove === 'Scissor') {
                    result = 'You win';
                }
            } else if (buttonMove === 'Paper') {
                if (botMove === 'Rock') {
                    result = 'You win';
                } else if (botMove === 'Paper') {
                    result = 'Tie';
                } else if (botMove === 'Scissor') {
                    result = 'You lose';
                }
            } else if (buttonMove === 'Scissor') {
                if (botMove === 'Rock') {
                    result = 'You lose';
                } else if (botMove === 'Paper') {
                    result = 'You win';
                } else if (botMove === 'Scissor') {
                    result = 'Tie';
                }
            }

            alert(`You picked ${buttonMove}, bot picked ${botMove}, ${result}.`);
        }
    </script>
</body>

</html>
