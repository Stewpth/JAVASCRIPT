<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11n Activity</title>
</head>

<body>
    <script>
        function countWords(words) {
            let result = {};
            for (let i = 0; i < words.length; i++) {
                let word = words[i];
                if (result[word]) {
                    result[word] += 1;
                } else {
                    result[word] = 1;
                }
            }

            return result;
        }

        console.log(countWords(['apple', 'grape', 'apple', 'apple']));
    </script>
</body>
