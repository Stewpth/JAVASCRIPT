<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12e Activity</title>
</head>

<body>
    <button class="add-to-cart-btn" onclick="messageCart()">Add to Cart</button>
    <p class="message-added"></p>
    <script>
        function messageCart() {
            const messageBox = document.querySelector('.message-added');
            messageBox.innerHTML = 'Added';
            setTimeout(function () {
                messageBox.innerHTML = '';
            }, 2000);
        }
    </script>
</body>

</html>
