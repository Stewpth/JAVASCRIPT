<!DOCTYPE html>
<html>

<head>
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="rmk-rock-paper-scissor.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button onclick="playGame('rock')" class="button-style js-rock-btn">
        <img class="move-icon" src="12-RockPaperScissor-icon/rock-emoji.png">
    </button>

    <button onclick="playGame('paper')" class="button-style js-paper-btn">
        <img class="move-icon" src="12-RockPaperScissor-icon/paper-emoji.png">
    </button>

    <button onclick="playGame('scissors')" class="button-style js-scissor-btn">
        <img class="move-icon" src="12-RockPaperScissor-icon/scissors-emoji.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-move move"></p>
    <p class="js-score score"></p>
    <button class="reset-btn js-reset-btn">Reset Score</button>
    <button class="auto-play-btn js-auto-play-btn">Auto Play</button>
    <p class="js-verify-msg-box"></p>

    <script src="rmk-rock-paper-scissor.js"></script>
</body>

</html>
