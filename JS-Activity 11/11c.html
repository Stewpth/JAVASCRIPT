<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11c Activity</title>
</head>

<body>
    <script>
        function arraySwap(array) {
            firstI = array[0];
            lastI = array[array.length - 1];

            array[array.length - 1] = firstI;
            array[0] = lastI;
            return array;
        }

        console.log(arraySwap([1, 20, 22, 24, 5]));
        console.log(arraySwap(['hi', 'hello', 'good']));
    </script>
</body>

</html>
