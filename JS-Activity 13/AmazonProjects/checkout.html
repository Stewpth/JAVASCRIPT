<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/checkout.css">
    <link rel="stylesheet" href="styles/checkout-headers.css">
</head>

<body>
    <header class="checkout-headers">
        <section class="left-section">
            <a href="amazon.html" class="homepage-logo">
                <img src="images/header-image/amazon-logo.png" alt="homepage-logo" class="homepage-logo-pic">
            </a>
        </section>
        <section class="middle-section">
            <span class="checkout-text">Checkout (<a href="amazon.html" class="item-quantity">0 items</a>)</span>
        </section>
        <section class="right-section">
            <img src="images/header-image/checkout-lock-icon.png" alt="checkout-lock-icon" class="checkout-lock-icon">
        </section>
    </header>

    <main>
        <h2 class="summary-title">Review your order</h2>

        <section class="checkout-grid">

            <aside class="cart-summary">cart-summary</aside>

            <aside class="payment-info">
                <div class="summary-order">
                    <h3 class="order-summary">Order Summary</h3>
                    <div class="payment-summary-row">
                        <div class="item-summary">Items (0):</div>
                        <div class="payment-summary-money">$0.00</div>
                    </div>
                    <div class="payment-summary-row">
                        <span class="shipping-summary">Shipping & handling:</span>
                        <div class="payment-summary-money">$0.00</div>
                    </div>
                    <div class="payment-summary-row subtotal-row">
                        <span class="total-no-tax-summary subtotal-left-row">Total before tax:</span>
                        <div class="payment-summary-money subtotal-right-row">$0.00</div>
                    </div>
                    <div class="payment-summary-row">
                        <span>Estimated tax (10%):</span>
                        <div class="payment-summary-money">$0.00</div>
                    </div>
                </div>

                <div class="total-summary-order">
                    <h3 class="total-cost">Order total:</h3>
                    <h3 class="total-cost">$0.00</h3>
                </div>

                <div class="place-order-box">
                    <button class="place-order-btn button-primary">
                        Place your order
                    </button>
                </div>
            </aside>

        </section>

    </main>
</body>

</html>
