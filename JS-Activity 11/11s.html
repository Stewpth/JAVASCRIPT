<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11s Activity</title>
</head>

<body>
    <script>
        function removeDuplicateEgg(foods) {
            let food = [];
            let eggCount = 0;

            for (let i = 0; i < foods.length; i++) {
                if (foods[i] === 'egg' && eggCount < 2) {
                    eggCount++;
                    continue;
                }
                food.push(foods[i]);
            }

            return food;
        }

        console.log(removeDuplicateEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
</body>
