<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12f Activity</title>
</head>

<body>
    <button class="button" onclick="updateButton()">Add to Cart</button>

    <p class="notif-button"></p>
    <script>
        let notifAdd;

        function updateButton() {
            document.querySelector('.notif-button').innerHTML =
                'Added';

            clearTimeout(notifAdd);
            notifAdd = setTimeout(function () {
                document.querySelector('.notif-button').innerHTML = '';
            }, 2000);
        }
    </script>
</body>

</html>
