<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11u Activity</title>
</head>

<body>
    <script>
        const foods = ['egg', 'apple', 'egg', 'egg', 'ham'];

        function removeEgg(foods) {
            const reverseWord = foods.reverse();

            const result = [];
            let count = 0;

            for (let i = 0; i < foods.length; i++) {
                if (foods[i] === 'egg' && count < 2) {
                    count++;
                    continue;
                }

                result.push(reverseWord[i]);
            }

            result.reverse();

            return result;
        }

        console.log(removeEgg(foods.slice()));
        console.log(foods);
    </script>
</body>

</html>
