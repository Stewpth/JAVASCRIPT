<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
    <style>
        body {
            background-color: rgb(15, 15, 15);
            font-family: arial;
        }

        button {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
        }

        .input-button {
            background-color: rgb(75, 75, 75);
        }

        .operation-button {
            background-color: rgb(207, 143, 4);
            color: white;
        }

        .clear-button {
            background-color: rgb(75, 75, 75);
            font-size: 14px;
        }

        .result,
        .inputs {
            color: white;
            font-size: 25px;
        }

        .result {
            color: violet;
        }
    </style>
</head>

<body>
    <p class="display-inputs inputs"></p>
    <p class="display-calculation result"></p>
    <p>
        <button class="input-button" onclick="updateCalculation('1')">1</button>
        <button class="input-button" onclick="updateCalculation('2')">2</button>
        <button class="input-button" onclick="updateCalculation('3')">3</button>
        <button class="operation-button" onclick="updateCalculation(' + ')">+</button>
    </p>

    <p>
        <button class="input-button" onclick="updateCalculation('4');">4</button>
        <button class="input-button" onclick="updateCalculation('5');">5</button>
        <button class="input-button" onclick="updateCalculation('6');">6</button>
        <button class="operation-button" onclick="updateCalculation(' - ')">-</button>
    </p>

    <p>
        <button class="input-button" onclick="updateCalculation('7');">7</button>
        <button class="input-button" onclick="updateCalculation('8');">8</button>
        <button class="input-button" onclick="updateCalculation('9');">9</button>
        <button class="operation-button" onclick="updateCalculation(' * ');">*</button>
    </p>

    <p>
        <button class="input-button" onclick="updateCalculation('0');">0</button>
        <button class="input-button" onclick="updateCalculation('.');">.</button>
        <button class="input-button" onclick="
        calculation = eval(calculation);
        document.querySelector('.display-calculation').innerHTML = calculation;
    ">=</button>
        <button class="operation-button" onclick="updateCalculation(' / ');">/</button>
    </p>

    <button class="clear-button" onclick="
        calculation = '';
        resetCalculation();
        localStorage.removeItem('calculation');
    ">Clear</button>

    <script>
        let calculation = JSON.parse(localStorage.getItem('calculation')) || '';

        function resetCalculation() {
            document.querySelector('.display-inputs').innerHTML = '';
            document.querySelector('.display-calculation').innerHTML = '';
        }

        function updateCalculation(buttonValue) {
            calculation += buttonValue;
            document.querySelector('.display-inputs').innerHTML = calculation;

            localStorage.setItem('calculation', JSON.stringify(calculation));
        }
    </script>
</body>

</html>
