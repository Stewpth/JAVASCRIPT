<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12h Activity</title>
</head>

<body>
    <button onclick="addMessage()">Add</button>
    <button onclick="removeMessage()">Remove</button>
    <script>
        let messages = 2;
        let defaultTitle = true;

        document.title = 'App'

        setInterval(function () {
            if (defaultTitle) {
                document.title = `(${messages}) New Messages`;
                defaultTitle = false;
            } else {
                document.title = 'App';
                defaultTitle = true;
            }
        }, 1000);


        function addMessage() {
            messages++;
        }
        function removeMessage() {
            messages--;
        }
    </script>
</body>

</html>
