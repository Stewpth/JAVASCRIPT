<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11p Activity</title>
</head>

<body>
    <script>
        function findIndex(words) {
            let index = '-1';

            for (let i = 0; i < words.length; i++) {
                if (words[i] === 'search') {
                    index = i;
                    break;
                }
            }

            return index;
        }

        console.log(findIndex(['hello', 'world', 'search', 'good', 'search']));
        console.log(findIndex(['not', 'found']));
    </script>
</body>

</html>
