<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12g Activity</title>
</head>

<body>
    <script>
        let webTitle = 'App';
        document.title = webTitle;

        setInterval(function () {
            if (webTitle === 'App') {
                webTitle = '(2) New Messages';
                document.title = webTitle;
            } else if (webTitle === '(2) New Messages') {
                webTitle = 'App';
                document.title = webTitle;
            }
        }, 1000);
    </script>
</body>

</html>
