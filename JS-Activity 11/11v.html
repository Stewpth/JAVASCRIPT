<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11v Activity</title>
</head>

<body>
    <script>
        let num = 1;
        for (let i = 1; i < 20; i++) {
            console.log(num);
            num = i;

            if (num % 3 === 0 && num % 5 === 0) {
                num = 'fizzbuzz';
            }

            if (num % 3 === 0) {
                num = 'fizz';
            } else if (num % 5 === 0) {
                num = 'buzz';
            }

        }
    </script>
</body>

</html>
