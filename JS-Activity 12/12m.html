<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12m Activity</title>
</head>

<body>
    <script>
        function addNum(array, num) {
            const arrayNumsAddedByNum = array.map(nums => nums + num);

            return arrayNumsAddedByNum;
        }

        console.log(addNum([1, 2, 3], 2));
        console.log(addNum([-2, -1, 0, 99], 2));
    </script>
</body>

</html>
