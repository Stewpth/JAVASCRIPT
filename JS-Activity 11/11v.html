<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11v Activity</title>
</head>

<body>
    <script>
        for (let num = 1; num <= 20; num++) {
            let isRemainderZero = '';

            if (num % 3 === 0) {
                isRemainderZero += `Fizz`;
            }

            if (num % 5 === 0) {
                isRemainderZero += 'Buzz';
            }

            if (!isRemainderZero) {
                console.log(num);
            } else {
                console.log(isRemainderZero);
            }
        }
    </script>
</body>

</html>
