<!DOCTYPE html>
<html>

<head>
    <title>7g activity</title>
</head>

<body>
    <script>
        function convertLength(length, from, to) {
            if (from === 'miles' && to === 'km') {
                length = length * 1.6;
                return `${length} ${to}`;
            } else if (from === 'km' && to == 'miles') {
                length = length / 1.6;
                return `${length} ${to}`;
            } else if (from === to) {
                return `${length} ${to}`;
            }
        }

        console.log(convertLength(50, 'miles', 'km'));
        console.log(convertLength(32, 'km', 'miles'));
        console.log(convertLength(50, 'km', 'km'));
    </script>
</body>

</html>
