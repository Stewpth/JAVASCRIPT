<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="checkout-header">
        <section class="left-section">
            <a href="amazon.html" class="homepage-logo">
                <img src="images/header-image/amazon-logo.png" alt="homepage-logo">
            </a>
        </section>
        <section class="middle-section">
            <span>Checkout(<p class="item-quantity">0 items</p>)</span>
        </section>
        <section class="right-section">
            <img src="images/header-image/checkout-lock-icon.png" alt="checkout-lock-icon">
        </section>
    </header>
</body>

</html>
