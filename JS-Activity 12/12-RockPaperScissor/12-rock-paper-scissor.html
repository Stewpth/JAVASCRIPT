<!DOCTYPE html>
<html>

<head>
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="12-rock-paper-scissor.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="button-style js-rock-btn">
        <img class="move-icon" src="RockPaperScissor-icon/rock-emoji.png">
    </button>

    <button class="button-style js-paper-btn">
        <img class="move-icon" src="RockPaperScissor-icon/paper-emoji.png">
    </button>

    <button class="button-style js-scissors-btn">
        <img class="move-icon" src="RockPaperScissor-icon/scissors-emoji.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-move move"></p>
    <p class="js-score score"></p>
    <button class="reset-btn js-reset-btn">Reset Score</button>
    <button class="autoplay-btn js-autoplay-btn">Auto Play</button>

    <div class="reset-notify"></div>

    <script src="12-rock-paper-scissor.js"></script>
</body>

</html>
