<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="checkout-header">
        <section class="left-section">
            <a href="amazon.html" class="homepage-logo">
                <img src="images/header-image/amazon-logo.png" alt="homepage-logo">
            </a>
        </section>
        <section class="middle-section">
            <span>Checkout(<p class="item-quantity">0 items</p>)</span>
        </section>
        <section class="right-section">
            <img src="images/header-image/checkout-lock-icon.png" alt="checkout-lock-icon">
        </section>
    </header>

    <main>
        <aside class="payment-info">
            <h2 class="payment-summary-title">Review your order</h2>

            <div class="summary-order">
                <h3>Order summary</h3>
                <div class="payment-summary-row">
                    <div>Items (0):</div>
                    <div class="payment-summary-money">$0.00</div>
                </div>
                <div class="payment-summary-row">
                    <span>Shipping & handling:</span>
                    <div class="payment-summary-money">$0.00</div>
                </div>
                <div class="payment-summary-row">
                    <span>Total before tax:</span>
                    <div class="payment-summary-money">$0.00</div>
                </div>
                <div class="payment-summary-row">
                    <span>Estimated tax (10%):</span>
                    <div class="payment-summary-money">$0.00</div>
                </div>
            </div>

            <div class="total-summary-order">
                <h2>Order total:</h2>
                <h2 class="total-cost">$0.00</h2>
            </div>

            <div class="place-order-box">
                <button class="place-order-btn">Place your order</button>
            </div>
        </aside>
    </main>
</body>

</html>
