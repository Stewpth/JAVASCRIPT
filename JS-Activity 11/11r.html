<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11r Activity</title>
</head>

<body>
    <script>
        function removeEgg(foods) {
            let food = [];

            for (let i = 0; i < foods.length; i++) {
                if (foods[i] === 'egg') {
                    continue;
                }
                food.push(foods[i]);
            }

            return food;
        }

        console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
</body>
