<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11g Activity</title>
</head>

<body>
    <script>
        let nums = [1, 2, 3];

        let addOne = [];

        for (let i = 0; i < nums.length; i++) {
            addOne.push(nums[i] += 1);
        }

        console.log(addOne);
    </script>
</body>

</html>
