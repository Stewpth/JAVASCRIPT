<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11m Activity</title>
</head>

<body>
    <script>
        function minMax(nums) {
            const result = {
                min: 0,
                max: 0
            }

            if (nums.length === 0) {
                result.max = 'null';
                result.min = 'null';
                return result;
            } else if (nums.length === 1) {
                result.max = nums[0];
                result.min = nums[0];
                return result;
            }

            let num = nums[0];

            for (let i = 0; i < nums.length; i++) {
                if (nums[i] > num) {
                    num = nums[i];
                    result.max = num;
                } else if (nums[i] < num) {
                    num = nums[i];
                    result.min = num;
                }
            }

            return result;
        }

        console.log(minMax([1, -3, 5]));
        console.log(minMax([-2, 3, -5, 7, 10]));
        console.log(minMax([]));
        console.log(minMax([3]));
    </script>
</body>

</html>
