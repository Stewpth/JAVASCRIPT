<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10b Activity</title>
    <style>
        button {
            cursor: pointer;
            margin-right: 10px;
        }

        .request-btn {
            font-size: 11px;
            font-weight: bold;
            padding: 10px 12px;
            border: none;
            border-radius: 5px;
            background-color: black;
            color: white;
        }

        .sched-btn {
            font-size: 11px;
            font-weight: bold;
            padding: 10px 12px;
            border: none;
            border-radius: 5px;
            background-color: rgb(230, 230, 230);
            color: black;
        }
    </style>
</head>

<body>
    <button class="request-btn">Request Now</button>
    <button class="sched-btn">Schedule for later</button>
</body>

</html>
