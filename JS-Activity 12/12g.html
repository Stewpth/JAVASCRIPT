<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12g Activity</title>
</head>

<body>
    <script>
        let defaultTitle = true;
        document.title = 'App'

        setInterval(function () {
            if (defaultTitle) {
                document.title = '(2) New Messages';
                defaultTitle = false;
            } else {
                document.title = 'App';
                defaultTitle = true;
            }
        }, 1000);
    </script>
</body>

</html>
