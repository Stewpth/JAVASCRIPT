<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!--Roboto Fonts for better looks-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/style-checkout/checkout-headers.css">
    <link rel="stylesheet" href="styles/style-checkout/checkout.css">


</head>

<body>
    <header class="checkout-headers js-checkout-headers"></header>

    <main>
        <h2 class="summary-title">Review your order</h2>

        <!-- The Main content of the entire page -->
        <section class="checkout-grid">
            <!-- The Summary of the entire products in Cart -->
            <aside class="cart-summary js-cart-summary"></aside>
            <aside class="payment-info js-payment-info"></aside>
        </section>
    </main>

    <script type="module" src="scripts/checkout.js"></script>
</body>

</html>
