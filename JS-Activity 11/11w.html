<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11w Activity</title>
</head>

<body>
    <script>
        function findIndex(array, word) {
            let wordIndex = '-1';

            for (let i = 0; i < array.length; i++) {
                if (array[i] === word) {
                    wordIndex = i;
                    break;
                }
            }

            return wordIndex;
        }

        function unique(array) {
            let duplicate = [];
            let word = '';

            for (let i = 0; i < array.length; i++) {
                word = array[i];
                if (findIndex(duplicate, word) === '-1') {
                    duplicate.push(word);
                }
            }

            return duplicate;
        }

        console.log(unique(['green', 'red', 'blue', 'red']));
        console.log(unique(['red', 'green', 'green', 'red']));
    </script>
</body>
