<!DOCTYPE html>
<html>

<head>
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="10-rock-paper-scissor.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button onclick="playGame('rock')" class="button-style">
        <img class="move-icon" src="RockPaperScissor-icon/rock-emoji.png">
    </button>

    <button onclick="playGame('paper')" class="button-style">
        <img class="move-icon" src="RockPaperScissor-icon/paper-emoji.png">
    </button>

    <button onclick="playGame('scissors')" class="button-style">
        <img class="move-icon" src="RockPaperScissor-icon/scissors-emoji.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-move move"></p>
    <p class="js-score score"></p>
    <button onclick="resetScore()" class="reset-btn">Reset Score</button>

    <script src="10-rock-paper-scissor.js"></script>
</body>

</html>
