<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
</head>

<body>
    <header class="amazon-header">
        <section class="amazon-logo-box">
            <button class="homepage">
                <img class="amazon-logo" src="images/amazon-logo-white.png" alt="amazon-logo">
            </button>
        </section>
        <section class="search-box">
            <input type="search" class="amazon-search">
            <button class="search-btn">
                <img src="images/search-icon.png" alt="amazon-search-icon" class="search-icon">
            </button>
        </section>
        <section class="order-management-box">
            <button class="manage-order">
                <p>Returns</p>
                <p>& Orders</p>
            </button>
            <button class="cart-btn">
                <p>2</p>
                <img src="images/cart-icon.png" alt="cart-icon">
                <p>cart</p>
            </button>
        </section>
    </header>
</body>

</html>
